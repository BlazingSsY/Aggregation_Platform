# =================================================================
#  nginx 站点配置：单页应用（SPA）静态服务
#  - listen 80：容器内默认端口（对外端口通过 docker -p 映射）
#  - try_files：刷新非根路径不 404（admin/users 等）
#  - gzip：常见文本类型在线压缩，节省传输体积
#  - assets 长期缓存：构建产物文件名含 hash，可以放心 immutable
# =================================================================

server {
  listen       80;
  listen  [::]:80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # 关闭暴露版本号
  server_tokens off;

  # ----- gzip -----
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml
    font/ttf
    font/otf;

  # ----- 静态资源长期缓存（vite 产物文件名带 hash） -----
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # favicon / 其它根目录静态文件
  location = /favicon.svg { access_log off; expires 7d; }
  location = /favicon.ico { access_log off; expires 7d; log_not_found off; }

  # ----- SPA 路由 fallback -----
  # /admin/users、/login 等前端路由刷新时回退到 index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # 大小限制（如未来要做上传可调整）
  client_max_body_size 16m;
}
